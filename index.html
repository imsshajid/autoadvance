<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bot Control Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 24px;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      color: #94a3b8;
    }

    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 18px;
      margin-top: 18px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      color: white;
    }

    .green { background: #16a34a; }
    .red { background: #dc2626; }
    .blue { background: #2563eb; }
    .gray { background: #475569; }

    pre {
      background: #020617;
      color: #cbd5e1;
      padding: 14px;
      border-radius: 10px;
      overflow: auto;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      background: #1e293b;
      border: 1px solid #334155;
    }

    .ok { color: #22c55e; }
    .bad { color: #ef4444; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Bot Control Panel</h1>
    <p>Use this page to control your Cloudflare Worker bot.</p>

    <div class="card">
      <h2>Master Control</h2>
      <div class="row">
        <button class="green" onclick="callApi('/on')">Turn ON</button>
        <button class="red" onclick="callApi('/off')">Turn OFF</button>
      </div>
    </div>

    <div class="card">
      <h2>Generation Control</h2>
      <div class="row">
        <button class="green" onclick="callApi('/generation-on')">Generation ON</button>
        <button class="red" onclick="callApi('/generation-off')">Generation OFF</button>
      </div>
    </div>

    <div class="card">
      <h2>Validation Control</h2>
      <div class="row">
        <button class="green" onclick="callApi('/validation-on')">Validation ON</button>
        <button class="red" onclick="callApi('/validation-off')">Validation OFF</button>
      </div>
    </div>

    <div class="card">
      <h2>Status</h2>
      <div class="row">
        <button class="blue" onclick="loadStatus()">Refresh Status</button>
      </div>
      <div id="statusText" class="status-box">No status loaded yet.</div>
      <pre id="output">Waiting...</pre>
    </div>
  </div>

  <script>
    const BASE_URL = "https://livebot.themrmillion.workers.dev";

    async function callApi(path) {
      const output = document.getElementById("output");
      const statusText = document.getElementById("statusText");

      output.textContent = "Loading...";
      statusText.textContent = "Request in progress...";

      try {
        const res = await fetch(BASE_URL + path, {
          method: "GET"
        });

        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);

        if (data.ok) {
          statusText.innerHTML = '<span class="ok">Success</span>: ' + path;
        } else {
          statusText.innerHTML = '<span class="bad">Failed</span>: ' + path;
        }
      } catch (err) {
        output.textContent = String(err);
        statusText.innerHTML = '<span class="bad">Error</span>: ' + String(err);
      }
    }

    async function loadStatus() {
      const output = document.getElementById("output");
      const statusText = document.getElementById("statusText");

      output.textContent = "Loading status...";
      statusText.textContent = "Checking worker status...";

      try {
        const res = await fetch(BASE_URL + "/status", {
          method: "GET"
        });

        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);

        if (data.ok) {
          const totalCycles = Array.isArray(data.cycles) ? data.cycles.length : 0;
          statusText.innerHTML = `<span class="ok">Worker reachable</span> | cycles in KV: ${totalCycles}`;
        } else {
          statusText.innerHTML = '<span class="bad">Status failed</span>';
        }
      } catch (err) {
        output.textContent = String(err);
        statusText.innerHTML = '<span class="bad">Error</span>: ' + String(err);
      }
    }
  </script>
</body>
</html>
